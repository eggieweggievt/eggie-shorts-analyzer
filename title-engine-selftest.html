<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Title Engine V4 — self test</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:760px;margin:24px auto;padding:0 16px;color:#2a2233;background:#fbf7ff}
  h1{font-size:20px} h2{font-size:15px;margin-top:24px}
  input{padding:8px 10px;border:1.5px solid #b9a7d6;border-radius:8px;width:60%;font-size:14px}
  button{padding:8px 14px;border-radius:999px;border:1.5px solid #3a2a4d;background:#3a2a4d;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
  ol{line-height:1.7} li{margin:2px 0}
  .meta{color:#7a6a8d;font-size:12px;margin:2px 0 8px}
  .pass{color:#1a7f37;font-weight:700}.fail{color:#b3261e;font-weight:700}
  .card{background:#fff;border:1px solid #e7ddf3;border-radius:12px;padding:14px 16px;margin:12px 0}
</style>
</head>
<body>
<h1>🐙 Title Engine V4 — self test</h1>
<p class="meta">Embeds the exact template bank + engine from analyzer.html (Datamuse calls disabled here so it runs fully offline). Type a subject, hit Generate, then "Show more" repeatedly to see the depth of variety + that there are no duplicates.</p>

<div class="card">
  <input id="subj" value="pineapple pizza" placeholder="e.g. elden ring, my morning routine, this VTuber moment" />
  <button onclick="run()">Generate</button>
  <button onclick="pullYT()" style="background:#b3261e;border-color:#b3261e">📺 Pull real YouTube searches (live)</button>
  <div id="auto" class="meta"></div>
  <div id="ytout" class="meta"></div>
</div>

<div id="live" class="card" style="display:none">
  <h2 id="liveh">Live output</h2>
  <ol id="out"></ol>
  <button id="more" onclick="showMore()">✨ Show me more titles</button>
  <div id="seen" class="meta"></div>
</div>

<div id="report"></div>

<script>
// ---- Trimmed but faithful copy of the V4 template bank ----
const TITLE_TEMPLATES = {
  curiosity:[(l,u,c)=>`Nobody talks about ${l}`,(l,u,c)=>`The truth about ${l}`,(l,u,c)=>`Why ${l} hits different`,(l,u,c)=>`What no one tells you about ${l}`,(l,u,c)=>`The real reason ${l} is everywhere`,(l,u,c)=>`There's something off about ${l}`,(l,u,c)=>`${c}… but it gets weirder`,(l,u,c)=>`Watch what happens with ${l}`,(l,u,c)=>`I can't stop thinking about ${l}`,(l,u,c)=>`${c} has a secret`,(l,u,c)=>`You weren't supposed to see ${l}`,(l,u,c)=>`The ${l} thing nobody warned me about`,(l,u,c)=>`Wait for the ${l} part`],
  shock:[(l,u,c)=>`Wait — ${u}?!`,(l,u,c)=>`${c} (you have to see this)`,(l,u,c)=>`${u} BROKE ME`,(l,u,c)=>`${c} is not what you think`,(l,u,c)=>`I did NOT expect ${l} to do that`,(l,u,c)=>`${u} WENT TOO FAR 💀`,(l,u,c)=>`no because ${l}?? actually??`,(l,u,c)=>`${c} just changed everything`,(l,u,c)=>`this is the most unhinged ${l} ever`,(l,u,c)=>`${u} HAS NO RIGHT TO BE THIS GOOD`,(l,u,c)=>`okay ${l} was NOT on my bingo card`],
  personal:[(l,u,c)=>`I didn't expect ${l} to do this`,(l,u,c)=>`What ${l} actually taught me`,(l,u,c)=>`POV: you just found ${l}`,(l,u,c)=>`${c}, from someone who's been there`,(l,u,c)=>`me trying ${l} for the first time`,(l,u,c)=>`nobody told me ${l} would feel like this`,(l,u,c)=>`the day ${l} finally clicked for me`,(l,u,c)=>`how ${l} completely rewired my brain`,(l,u,c)=>`I gave ${l} one more shot. wow.`,(l,u,c)=>`${c} but make it a personal attack`],
  contrarian:[(l,u,c)=>`${c} is overrated. Here's why.`,(l,u,c)=>`Unpopular opinion: ${l}`,(l,u,c)=>`Everyone is wrong about ${l}`,(l,u,c)=>`Stop sleeping on ${l}`,(l,u,c)=>`${c} is actually a trap`,(l,u,c)=>`hot take: ${l} peaked and nobody noticed`,(l,u,c)=>`you've been doing ${l} wrong this whole time`,(l,u,c)=>`${c} isn't deep, you just want it to be`,(l,u,c)=>`delete your opinion on ${l}`],
  numbered:[(l,u,c)=>`3 things I wish I knew about ${l}`,(l,u,c)=>`The 1 thing that changed how I do ${l}`,(l,u,c)=>`5 ${l} mistakes you're making`,(l,u,c)=>`7 seconds of ${l} that live in my head`,(l,u,c)=>`2 types of people who love ${l}`,(l,u,c)=>`ranking ${l} from cursed to perfect`,(l,u,c)=>`the top 3 ${l} moments of all time`,(l,u,c)=>`4 reasons ${l} is taking over`],
  question:[(l,u,c)=>`Why is ${l} everywhere right now?`,(l,u,c)=>`How is ${l} this good?`,(l,u,c)=>`Why does ${l} feel different?`,(l,u,c)=>`who let ${l} happen?`,(l,u,c)=>`is ${l} okay? genuinely asking`,(l,u,c)=>`what if ${l} was the answer all along?`,(l,u,c)=>`how did ${l} get this out of hand?`,(l,u,c)=>`did ${l} just do that on purpose?`],
  comparison:[(l,u,c)=>`${c} vs what everyone else does`,(l,u,c)=>`The best ${l} I've ever seen`,(l,u,c)=>`${c}, ranked`,(l,u,c)=>`${c} before vs after`,(l,u,c)=>`expectation vs reality: ${l}`,(l,u,c)=>`${c} but it's the final boss version`,(l,u,c)=>`the ${l} they don't want vs the one you get`],
  reveal:[(l,u,c)=>`What they don't show you about ${l}`,(l,u,c)=>`The hidden side of ${l}`,(l,u,c)=>`${c}: behind the scenes`,(l,u,c)=>`the ${l} part they always cut`,(l,u,c)=>`what really goes into ${l}`,(l,u,c)=>`${c}, fully uncut`,(l,u,c)=>`the ${l} no one posts`],
  vtuber:[(l,u,c)=>`This VTuber ${l}?!`,(l,u,c)=>`Nobody Can Guess ${c}`,(l,u,c)=>`${c} could KILL a VTuber`,(l,u,c)=>`How I Accidentally Got Into ${c}`,(l,u,c)=>`VTuber ${l} gets completely out of hand`,(l,u,c)=>`VTubers EXPLAINED — ${l} edition`,(l,u,c)=>`${c} is not what you think (VTuber moment)`,(l,u,c)=>`when a VTuber tries ${l} 💀`,(l,u,c)=>`this is why you don't let a VTuber near ${l}`,(l,u,c)=>`VTuber reacts to ${l} and immediately regrets it`,(l,u,c)=>`${c}, but a VTuber is involved`,(l,u,c)=>`small VTuber discovers ${l}`],
  pov:[(l,u,c)=>`POV: ${l}`,(l,u,c)=>`POV you're about to ${l} but it goes wrong`,(l,u,c)=>`Imagine if ${l} actually happened`,(l,u,c)=>`Send this to a friend who needs to see ${l}`,(l,u,c)=>`POV: it's 3am and ${l}`,(l,u,c)=>`POV: you're the only one who gets ${l}`,(l,u,c)=>`tag someone who is exactly like ${l}`,(l,u,c)=>`POV: ${l} but everything is fine (it is not)`],
  relatable:[(l,u,c)=>`${c} and I felt that`,(l,u,c)=>`it's just ${l} for me`,(l,u,c)=>`if you know ${l}, you know`,(l,u,c)=>`${c} said what we were all thinking`,(l,u,c)=>`the way ${l} lives in my head rent free`,(l,u,c)=>`${c} is a personality trait now`],
  tutorial:[(l,u,c)=>`how to actually do ${l}`,(l,u,c)=>`${c} in 15 seconds`,(l,u,c)=>`the easiest way to ${l}`,(l,u,c)=>`do ${l} like this instead`,(l,u,c)=>`steal my ${l} trick`,(l,u,c)=>`${c}, explained simply`],
  emoji:[(l,u,c)=>`${c} 😭`,(l,u,c)=>`${c}… 💀`,(l,u,c)=>`wait ${l} 👀`,(l,u,c)=>`${c} ✨ (watch till the end)`,(l,u,c)=>`${c} 🔥🔥`]
};

// ---- Exact engine logic (Datamuse stubbed so it runs offline) ----
const EggieTitleEngine = (function(){
  const BATCH = 8;
  let state = null;
  window.__eggieDatamuse = window.__eggieDatamuse || {};
  window.__eggieYTSuggest = window.__eggieYTSuggest || {};
  function rng(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
  function shuffle(arr,rand){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function casing(s){s=String(s||'').trim();return{l:s.toLowerCase(),u:s.toUpperCase(),c:s.charAt(0).toUpperCase()+s.slice(1)};}
  function norm(t){try{return String(t||'').toLowerCase().replace(/[\s\p{P}\p{S}]+$/u,'').replace(/\s+/g,' ').trim();}catch(e){return String(t||'').toLowerCase().replace(/[\s\W]+$/,'').replace(/\s+/g,' ').trim();}}
  function buildPool(subject,orderedCats,seed){
    const rand=rng(seed);const primary=casing(subject);
    const key=String(subject||'').toLowerCase();
    const yt=(window.__eggieYTSuggest[key]||[]);const dm=(window.__eggieDatamuse[key]||[]);
    const synSeen=new Set([key]);const syns=[];
    [...yt,...dm].forEach(w=>{const k=String(w||'').toLowerCase().trim();if(k&&!synSeen.has(k)){synSeen.add(k);syns.push(w);}});
    const variants=[primary,...syns.slice(0,6).map(casing)];
    const SWAPPABLE=new Set(['curiosity','question','comparison','reveal','numbered','tutorial','relatable','personal','contrarian']);
    const seen=new Set();const primaryTitles=[];const enrichedTitles=[];
    orderedCats.forEach(cat=>{const tpls=TITLE_TEMPLATES[cat];if(!tpls||!tpls.length)return;
      shuffle(tpls,rand).forEach(fn=>{
        try{const t0=fn(primary.l,primary.u,primary.c);const k0=norm(t0);if(t0&&k0&&!seen.has(k0)){seen.add(k0);primaryTitles.push(t0);}}catch(e){}
        if(SWAPPABLE.has(cat)){for(let i=1;i<variants.length;i++){const v=variants[i];try{const t1=fn(v.l,v.u,v.c);const k1=norm(t1);if(t1&&k1&&!seen.has(k1)){seen.add(k1);enrichedTitles.push(t1);}}catch(e){}}}
      });
    });
    return shuffle(primaryTitles,rand).concat(shuffle(enrichedTitles,rand));
  }
  function start(opts){state={subject:opts.subject,orderedCats:opts.orderedCats,seed:opts.seed,cursor:0};state.pool=buildPool(state.subject,state.orderedCats,state.seed);state.cursor=Math.min(BATCH,state.pool.length);window.__eggieTitleState=state;return state.pool.slice(0,state.cursor);}
  function more(){if(!state)return[];const next=state.pool.slice(state.cursor,state.cursor+BATCH);state.cursor+=next.length;return next;}
  function hasMore(){return!!state&&state.cursor<state.pool.length;}
  function poolSize(){return state?state.pool.length:0;}
  return {start,more,hasMore,poolSize};
})();

function hash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return Math.abs(h);}
function cats(subject){
  // mirrors the broadened category mix
  const p=['curiosity','shock','personal','contrarian','relatable','question','numbered','reveal','comparison','tutorial','pov','emoji'];
  if(/vtuber/i.test(subject)) p.unshift('vtuber');
  const seen=new Set();return p.filter(c=>seen.has(c)?false:seen.add(c));
}

let allShown=[];
function run(){
  const subject=document.getElementById('subj').value.trim().toLowerCase()||'this';
  allShown=[];
  const first=EggieTitleEngine.start({subject,orderedCats:cats(subject),seed:hash(subject)});
  document.getElementById('live').style.display='block';
  document.getElementById('liveh').textContent='Live output for: "'+subject+'"';
  const out=document.getElementById('out');out.innerHTML='';
  first.forEach(t=>{allShown.push(t);out.insertAdjacentHTML('beforeend','<li>'+esc(t)+'</li>');});
  document.getElementById('auto').textContent='Offline pool size for this subject: '+EggieTitleEngine.poolSize()+' unique titles.';
  refresh();
}
function showMore(){
  const batch=EggieTitleEngine.more();const out=document.getElementById('out');
  batch.forEach(t=>{allShown.push(t);out.insertAdjacentHTML('beforeend','<li>'+esc(t)+'</li>');});
  refresh();
}
function refresh(){
  document.getElementById('more').style.display=EggieTitleEngine.hasMore()?'inline-block':'none';
  const dupes=allShown.length-new Set(allShown.map(s=>s.toLowerCase())).size;
  document.getElementById('seen').innerHTML='Shown so far: '+allShown.length+' · exact duplicates: <span class="'+(dupes===0?'pass':'fail')+'">'+dupes+'</span>';
}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

// ---- live YouTube autocomplete (JSONP, no CORS, no key) ----
function youtubeSuggest(query){
  return new Promise(resolve=>{
    let done=false;window.google=window.google||{};window.google.ac=window.google.ac||{};
    const prev=window.google.ac.h;const script=document.createElement('script');
    function finish(list){if(done)return;done=true;window.google.ac.h=prev;if(script.parentNode)script.parentNode.removeChild(script);resolve(Array.isArray(list)?list:[]);}
    window.google.ac.h=function(data){let out=[];try{out=((data&&data[1])||[]).map(x=>Array.isArray(x)?x[0]:x).filter(Boolean);}catch(e){}finish(out);};
    script.onerror=()=>finish([]);
    script.src='https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&hl=en&q='+encodeURIComponent(query);
    document.head.appendChild(script);setTimeout(()=>finish([]),3000);
  });
}
async function pullYT(){
  const subject=document.getElementById('subj').value.trim().toLowerCase()||'this';
  const box=document.getElementById('ytout');box.innerHTML='⏳ asking YouTube what people search for "'+esc(subject)+'"…';
  const raw=await youtubeSuggest(subject);
  const cleaned=[];raw.forEach(p=>{let s=String(p||'').toLowerCase().replace(/\s+/g,' ').trim();
    if(!s||s===subject||s.length<4||s.length>42)return;
    if(/^(is|are|was|were|can|does|do|did|how|why|what|when|who|which|should|will)\b/.test(s))return;
    if(!cleaned.includes(s))cleaned.push(s);});
  if(!raw.length){box.innerHTML='⚠️ No response (offline, or the endpoint was blocked here). The offline engine still works — this only adds extra accuracy when online.';return;}
  window.__eggieYTSuggest[subject]=cleaned.slice(0,8);
  box.innerHTML='✅ Real YouTube searches pulled: <b>'+cleaned.slice(0,8).map(esc).join('</b>, <b>')+'</b><br>Regenerating with these folded in…';
  run(); // rebuild pool now that YT phrases are cached
}

// ---- automated assertions across many subjects ----
(function selfTest(){
  const subjects=['pineapple pizza','elden ring','this vtuber moment','my morning routine','minecraft','this story','horror','valorant'];
  const rows=[];let allPass=true;
  subjects.forEach(s=>{
    const first=EggieTitleEngine.start({subject:s,orderedCats:cats(s),seed:hash(s)});
    let collected=first.slice();
    while(EggieTitleEngine.hasMore()) collected=collected.concat(EggieTitleEngine.more());
    const uniq=new Set(collected.map(t=>t.toLowerCase())).size;
    const dupes=collected.length-uniq;
    const firstEight=first.length===8;
    const ok=firstEight&&dupes===0&&collected.length>=20;
    if(!ok) allPass=false;
    rows.push(`<tr><td>${esc(s)}</td><td>${first.length}</td><td>${collected.length}</td><td class="${dupes===0?'pass':'fail'}">${dupes}</td><td class="${ok?'pass':'fail'}">${ok?'PASS':'FAIL'}</td></tr>`);
  });
  document.getElementById('report').innerHTML=
    `<div class="card"><h2>Automated checks <span class="${allPass?'pass':'fail'}">${allPass?'ALL PASS ✓':'FAIL'}</span></h2>
     <p class="meta">For each subject: first batch must be 8, total pool ≥ 20, and zero duplicates.</p>
     <table style="width:100%;border-collapse:collapse;font-size:13px">
     <tr style="text-align:left;border-bottom:1px solid #ddd"><th>subject</th><th>first</th><th>total pool</th><th>dupes</th><th>result</th></tr>
     ${rows.join('')}</table></div>`;
  // reset for the interactive demo
  EggieTitleEngine.start({subject:document.getElementById('subj').value.trim().toLowerCase(),orderedCats:cats('pineapple pizza'),seed:hash('pineapple pizza')});
})();
run();
</script>
</body>
</html>
