<title>Eggie Creator Hub × BePlan</title>

<style>
  :root{
    --pink-hot:#FFB2F0; --blue:#63AAF4; --mint:#6BE4EA;
    --pink-light:#FFDBF7; --periwinkle:#90A5FF; --deep:#4D5BC0;
    --ink:#3a2a5a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#dfeaf5;font-family:'Poppins','Segoe UI',-apple-system,system-ui,sans-serif}
  body{display:flex;flex-direction:column;align-items:center;gap:22px;padding:36px}

  /* ---- 1080x1080 square artboard ---- */
  .stage{ /* scales the 1080 board down to fit the screen for preview */
    width:min(1080px,92vw); aspect-ratio:1/1; position:relative;
  }
  .artboard{
    position:absolute; top:0; left:0;
    width:1080px; height:1080px;
    transform-origin:top left;
    overflow:hidden; border-radius:40px;
    background:
      radial-gradient(820px 620px at 22% 16%, rgba(255,178,240,0.55), transparent 60%),
      radial-gradient(760px 640px at 84% 30%, rgba(107,228,234,0.45), transparent 62%),
      radial-gradient(900px 760px at 70% 96%, rgba(144,165,255,0.50), transparent 60%),
      linear-gradient(165deg,#fef0fb 0%,#eaf2ff 52%,#e7fbfc 100%);
    box-shadow:0 30px 90px rgba(99,170,244,0.30), 0 8px 24px rgba(255,178,240,0.30);
  }
  /* soft inner frame */
  .artboard::after{
    content:""; position:absolute; inset:34px; border-radius:34px;
    border:2px solid rgba(255,255,255,0.55);
    box-shadow:inset 0 0 60px rgba(255,255,255,0.45);
    pointer-events:none;
  }

  .deco{position:absolute; pointer-events:none}

  /* ---- center lockup ---- */
  .lockup{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:30px;
    width:100%;
  }
  .eggie{
    width:660px; max-width:82%; height:auto; display:block;
    filter:drop-shadow(0 16px 30px rgba(99,170,244,0.30)) drop-shadow(0 0 18px rgba(255,255,255,0.8));
  }

  /* the × collab node */
  .x-node{
    width:84px; height:84px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:#ffffff;
    box-shadow:0 14px 34px rgba(144,165,255,0.40), inset 0 0 0 6px rgba(255,255,255,0.9);
    position:relative;
  }
  .x-node::before{ /* gradient ring */
    content:""; position:absolute; inset:-7px; border-radius:50%; z-index:-1;
    background:linear-gradient(135deg,var(--pink-hot),var(--periwinkle) 55%,var(--mint));
    filter:blur(0.3px);
  }
  .x-node span{
    font-size:44px; font-weight:800; line-height:1;
    background:linear-gradient(135deg,var(--pink-hot),var(--periwinkle) 55%,var(--mint));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    transform:translateY(-3px);
  }

  /* Beplan lockup on a clean white card (logo is black, needs light bg) */
  .beplan{
    display:flex; align-items:center; gap:26px;
    padding:30px 56px; border-radius:34px;
    background:rgba(255,255,255,0.94);
    box-shadow:0 20px 46px rgba(99,170,244,0.28), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .beplan .badge{width:98px;height:98px;display:block}
  .beplan .word{
    font-size:76px; font-weight:700; letter-spacing:-1.5px; color:#0a0a0a;
    line-height:1; font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  }

  /* ---- download bar (not part of the image) ---- */
  .bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
  .btn{
    border:none;cursor:pointer;font:600 15px/1 'Poppins','Segoe UI',sans-serif;
    color:#fff;padding:13px 22px;border-radius:999px;
    background:linear-gradient(135deg,var(--pink-hot),var(--periwinkle) 60%,var(--mint));
    box-shadow:0 8px 20px rgba(144,165,255,0.35);
  }
  .btn:active{transform:translateY(1px)}
  .hint{font:500 13px/1.5 'Poppins','Segoe UI',sans-serif;color:#6b5f8a;max-width:560px;text-align:center}
</style>

<script>
  // fit the 1080 board into whatever width the stage gets, for on-screen preview
  function fit(){
    var stage=document.getElementById('stage');
    var s=stage.clientWidth/1080;
    document.getElementById('artboard').style.transform='scale('+s+')';
  }
  window.addEventListener('resize',fit); window.addEventListener('load',fit); fit();

  document.getElementById('dl').addEventListener('click',function(){
    var node=document.getElementById('artboard');
    var prev=node.style.transform; node.style.transform='none';
    html2canvas(node,{width:1080,height:1080,scale:1,backgroundColor:null,useCORS:true,allowTaint:false})
      .then(function(c){
        node.style.transform=prev; fit();
        var a=document.createElement('a');
        a.download='eggie-x-beplan-1080.png'; a.href=c.toDataURL('image/png'); a.click();
      }).catch(function(){
        node.style.transform=prev; fit();
        document.getElementById('hint').textContent='Export blocked by the browser for local files — please screenshot the square instead (or open this via a local server).';
      });
  });
</script>
